services:
  nextjs:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
    ports:
      - '9000:3000'
    # Removed host bind-mounts for production stability
    volumes:
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - ICECAST_HOST=${ICECAST_HOST:-localhost}
      - ICECAST_PORT=${ICECAST_PORT:-8000}
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: streamz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  icecast:
    image: moul/icecast
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - ./icecast.xml:/etc/icecast2/icecast.xml
      - ./recordings:/tmp/dumpfiles

  sync:
    build:
      context: .
      dockerfile: scripts/Dockerfile.sync
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./recordings:/tmp/dumpfiles
    network_mode: host

volumes:
  postgres_data:
